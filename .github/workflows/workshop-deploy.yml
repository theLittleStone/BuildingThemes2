name: Deploy to Steam Workshop

# Triggers:
#   1. Automatically — when Release Please creates a tag (v*) after merging a release PR
#   2. Manually     — Actions → "Deploy to Steam Workshop" → Run workflow
#
# The workflow does NOT build the mod — it publishes the pre-staged dist/ folder.
# Before merging a Release PR, run ./deploy.sh --release locally and commit dist/.
#
# The change note sent to Steam Workshop is extracted automatically from CHANGELOG.md
# for the current version, with a link to the full GitHub Release appended.
#
# One-time setup (do this once, then forget):
#   1. sudo apt-get install steamcmd
#   2. steamcmd +login YOUR_USERNAME +quit   (complete the Steam Guard prompt)
#   3. base64 ~/.steam/steamcmd/config/config.vdf   → copy the output
#   4. Add GitHub secret  STEAM_CONFIG_VDF  with that base64 string
#   5. Add GitHub secret  STEAM_USERNAME    with your Steam username
#
# If publishing fails with an auth error, repeat steps 2–4 to refresh the session
# (Steam sessions expire after ~1 year or when you log in from a new device).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      changeNote:
        description: 'Override change note (leave blank to extract from CHANGELOG.md)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PRO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify dist folder exists
        run: |
          if [[ ! -f "dist/BuildingThemes2/BuildingThemes2.dll" ]]; then
            echo "ERROR: dist/BuildingThemes2/BuildingThemes2.dll not found."
            echo "Run ./deploy.sh --release locally, commit dist/, then push."
            exit 1
          fi
          echo "dist/ contents:"
          ls -lh dist/BuildingThemes2/

      - name: Build change note from CHANGELOG.md
        id: note
        run: |
          # Use manual override if provided
          MANUAL_NOTE="${{ github.event.inputs.changeNote }}"
          if [[ -n "$MANUAL_NOTE" ]]; then
            echo "value=$MANUAL_NOTE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Derive version from the tag (strip leading 'v')
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Fall back to the version in the manifest when triggered manually without a tag
          if [[ -z "$VERSION" || "$VERSION" == "$TAG" ]]; then
            VERSION=$(python3 -c "import json,sys; print(json.load(open('.release-please-manifest.json'))['.'])")
          fi

          # Extract the section for this version from CHANGELOG.md.
          # Collects everything between "## [VERSION]" and the next "## [" heading.
          SECTION=$(awk \
            "/^## \[$VERSION\]/{found=1; next} \
             found && /^## \[/{exit} \
             found{print}" \
            CHANGELOG.md \
            | sed '/^[[:space:]]*$/d')  # strip blank lines at start/end

          # Convert the Markdown section to Steam BBCode.
          # Release Please produces a predictable subset of Markdown:
          #   ### Heading     → [h1]Heading[/h1]
          #   * item / - item → [list][*] item [/list]  (grouped below)
          #   **text**        → [b]text[/b]
          #   `text`          → [b]text[/b]  (inline code; Steam has no code tag)
          #   [text](url)     → [url=url]text[/url]
          #
          # List grouping: consecutive bullet lines are wrapped in a single [list]…[/list].
          BBCODE=$(echo "$SECTION" | python3 - <<'PYEOF'
import sys, re

def md_to_bb(text):
    # Apply URL conversion FIRST (before bold/code introduce extra brackets).
    # Use [^\[\]]+ so we only match genuine Markdown link text (no nested brackets).
    text = re.sub(r'\[([^\[\]]+)\]\(([^)]+)\)', r'[url=\2]\1[/url]', text)
    text = re.sub(r'\*\*(.+?)\*\*', r'[b]\1[/b]', text)
    text = re.sub(r'`(.+?)`',        r'[b]\1[/b]', text)
    return text

lines = sys.stdin.read().splitlines()
out = []
in_list = False

for line in lines:
    # h3 heading  →  [h1]…[/h1]
    m = re.match(r'^#{1,3}\s+(.*)', line)
    if m:
        if in_list:
            out.append('[/list]')
            in_list = False
        out.append(f'[h1]{m.group(1).strip()}[/h1]')
        continue

    # bullet  →  [*] item  (open list block if needed)
    m = re.match(r'^[\*\-]\s+(.*)', line)
    if m:
        if not in_list:
            out.append('[list]')
            in_list = True
        out.append(f'[*] {md_to_bb(m.group(1).strip())}')
        continue

    # non-bullet line closes any open list
    if in_list:
        out.append('[/list]')
        in_list = False

    if line.strip() == '':
        out.append('')
        continue

    out.append(md_to_bb(line))

if in_list:
    out.append('[/list]')

print('\n'.join(out))
PYEOF
)

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"

          if [[ -n "$BBCODE" ]]; then
            NOTE=$(printf '%s\n\n[url=%s]Full release notes on GitHub[/url]' "$BBCODE" "$RELEASE_URL")
          else
            NOTE="Release ${VERSION} - [url=${RELEASE_URL}]${RELEASE_URL}[/url]"
          fi

          # Steam Workshop change notes are capped at ~8 000 chars
          NOTE="${NOTE:0:8000}"

          # Write multiline value to GITHUB_OUTPUT
          {
            echo "value<<__EOF__"
            echo "$NOTE"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Show change note
        env:
          CHANGE_NOTE: ${{ steps.note.outputs.value }}
        run: |
          echo "──── Change note to be sent to Steam ────"
          echo "$CHANGE_NOTE"
          echo "─────────────────────────────────────────"

      - name: Install steamcmd
        run: |
          mkdir -p "$HOME/steamcmd"
          curl -sqL "https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz" \
            | tar -xz -C "$HOME/steamcmd"
          # Initialize and self-update
          "$HOME/steamcmd/steamcmd.sh" +quit || true
          echo "$HOME/steamcmd" >> "$GITHUB_PATH"

      - name: Install Steam session
        env:
          STEAM_CONFIG_VDF: ${{ secrets.STEAM_CONFIG_VDF }}
        run: |
          # steamcmd stores its data in ~/Steam when run from a custom directory
          STEAMROOT="$HOME/Steam"
          mkdir -p "$STEAMROOT/config"
          echo "$STEAM_CONFIG_VDF" | base64 -d > "$STEAMROOT/config/config.vdf"
          # Also place it where steamcmd looks via the .steam symlink
          mkdir -p "$HOME/.steam"
          ln -sfn "$STEAMROOT" "$HOME/.steam/steam"
          ln -sfn "$STEAMROOT" "$HOME/.steam/root"

      - name: Deploy to Steam Workshop
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          CHANGE_NOTE: ${{ steps.note.outputs.value }}
        run: |
          # Generate item VDF (Python handles escaping and multiline change notes)
          python3 - <<'PYEOF'
          import os

          workspace = os.environ['GITHUB_WORKSPACE']
          note     = os.environ.get('CHANGE_NOTE', 'Update')

          desc_path = os.path.join(workspace, 'Workshop', 'description.txt')
          with open(desc_path, 'r') as f:
              description = f.read()

          def vdf_escape(s):
              return s.replace('\\', '\\\\').replace('"', '\\"')

          vdf = (
              '"workshopitem"\n'
              '{\n'
              '\t"appid"\t\t\t"255710"\n'
              '\t"publishedfileid"\t"3708105182"\n'
              f'\t"contentfolder"\t\t"{workspace}/dist/BuildingThemes2"\n'
              f'\t"previewfile"\t\t"{workspace}/Workshop/PreviewImage.png"\n'
              f'\t"changenote"\t\t"{vdf_escape(note)[:7900]}"\n'
              '}\n'
          )

          with open('/tmp/item.vdf', 'w') as f:
              f.write(vdf)

          print("Generated /tmp/item.vdf:")
          print(vdf)
          PYEOF

          steamcmd.sh \
            +login "$STEAM_USERNAME" \
            +workshop_build_item /tmp/item.vdf \
            +quit
