name: Release Please

# How this works:
#
#   1. Every push to master is scanned for Conventional Commits
#      (feat:, fix:, chore:, docs:, refactor:, perf:, etc.)
#
#   2. Release Please opens (or updates) a "Release PR" that:
#        - bumps the version in .release-please-manifest.json
#        - updates CHANGELOG.md
#        - is titled e.g. "chore(main): release 2.1.0"
#
#   3. Before merging the Release PR:
#        - run ./deploy.sh --release  locally to build & stage dist/
#        - commit dist/ to master
#        - the Release PR will auto-update to include that commit
#
#   4. Merge the Release PR → Release Please creates tag vX.Y.Z
#      → workshop-deploy.yml fires automatically and publishes to Steam Workshop
#
# Versioning rules (semver):
#   feat:       → minor bump  (2.0.0 → 2.1.0)
#   fix:        → patch bump  (2.0.0 → 2.0.1)
#   feat!: or
#   BREAKING CHANGE: → major bump (2.0.0 → 3.0.0)

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
